<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SoulSync Widgets Harness</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="./dist/index.css" />
    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@19.0.0",
          "react/jsx-runtime": "https://esm.sh/react@19.0.0/jsx-runtime",
          "react-dom/client": "https://esm.sh/react-dom@19.0.0/client"
        }
      }
    </script>
  </head>
  <body>
    <main id="root"></main>
    <script type="module">
      import React from "react";
      import { createRoot } from "react-dom/client";
      import {
        Badge,
        Button,
        Card,
        Field,
        GlobalStyles,
        ProgressBar,
        Stepper,
        SyntheticBadge,
        notifyIntrinsicHeight
      } from "./dist/index.es.js";

      window.openai = {
        async callTool(name, args) {
          return {
            structuredContent: { name, args, ok: true },
            _meta: { mocked: true }
          };
        },
        async uploadFile(file) {
          return { fileId: `mock-${file.name}` };
        },
        notifyIntrinsicHeight(height) {
          console.info("mock notifyIntrinsicHeight", height);
        },
        setWidgetState(state) {
          console.info("mock setWidgetState", state);
        }
      };

      const params = new URLSearchParams(window.location.search);
      const widget = params.get("widget") || "sample";
      const isSynthetic = params.get("is_synthetic") === "true";

      function SampleWidget() {
        React.useEffect(() => {
          notifyIntrinsicHeight(document.documentElement.scrollHeight);
        }, []);

        return React.createElement(
          "div",
          { className: "ssw-scope ssw-harness" },
          React.createElement(GlobalStyles, null),
          React.createElement(
            Card,
            {
              header: React.createElement(
                "div",
                { className: "ssw-harness__header-row" },
                React.createElement(Badge, { text: "SoulSync AI", variant: "success" }),
                React.createElement(SyntheticBadge, { is_synthetic: isSynthetic })
              ),
              footer: "MCP Apps bridge mocked locally"
            },
            React.createElement("h1", { className: "ssw-harness__title" }, "위젯 셸 샘플"),
            React.createElement(Stepper, { currentStep: 2, totalSteps: 3, labels: ["입력", "검토", "완료"] }),
            React.createElement("div", { className: "ssw-harness__spacer-sm" }),
            React.createElement(Field, { label: "프로필 메모", helperText: "로컬 하네스 입력 필드입니다.", placeholder: "메모를 입력하세요" }),
            React.createElement("div", { className: "ssw-harness__spacer-sm" }),
            React.createElement(ProgressBar, { value: 64, label: "매칭 준비" }),
            React.createElement("div", { className: "ssw-harness__spacer-md" }),
            React.createElement(Button, { onClick: () => window.openai.callTool("sample", { source: "harness" }) }, "Mock callTool")
          )
        );
      }

      function App() {
        if (widget !== "sample") {
          return React.createElement("div", { className: "ssw-scope" }, `Unknown widget: ${widget}`);
        }

        return React.createElement(SampleWidget);
      }

      createRoot(document.getElementById("root")).render(React.createElement(App));
    </script>
  </body>
</html>
